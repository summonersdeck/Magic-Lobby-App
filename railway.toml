[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "pnpm --filter @workspace/db push-force && pnpm --filter @workspace/api-server run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
